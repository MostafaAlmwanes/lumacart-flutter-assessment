name: lumacart
description: A local-first Flutter storefront built against the Fake Store API.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.22.0'

flutter:
  uses-material-design: true
  assets:
      - assets/placeholders/
      - assets/generated/auth_pattern.png
      - assets/generated/avatar_placeholder.png
      - assets/generated/empty_cart.png
      - assets/generated/no_results.png
      - assets/generated/offline.png
      - assets/generated/splash_logo.png
      
dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  cryptography: ^2.9.0
  dio: ^5.10.0
  equatable: ^2.1.0
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  hive_ce_flutter: ^2.3.4
  intl: ^0.20.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/generated/app_icon.png
  min_sdk_android: 24

flutter_native_splash:
  color: "#FCF8FF"
  image: assets/generated/splash_logo.png

  android: true
  ios: false
  web: false

  android_12:
    color: "#FCF8FF"
    image: assets/generated/app_icon.png
    icon_background_color: "#3C4CC7"